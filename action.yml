name: "scalified/helm-chart-bump-action"
description: "Bumps Helm chart"
author: "Scalified"
branding:
  icon: "refresh-cw"
  color: "black"

inputs:
  token:
    description: "GitHub token with permissions to push changes"
    default: "${{ github.token }}"
    required: false
  dockerhub-namespace:
    description: "Docker Hub namespace (organization or user)"
    default: "library"
    required: false
  dockerhub-repository:
    description: "Docker Hub repository name"
    required: true
  docker-image-tag-pattern:
    description: "Regex pattern to match Docker image tags (default: semantic versioning)"
    required: false
    default: '^v?[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$'
  chart-file-path:
    description: "Path to the Helm chart's Chart.yaml file (relative to the repository root)"
    required: true

outputs:
  latest-tag:
    description: "The latest image tag found in Docker Hub matching the specified pattern"
    value: ${{ steps.fetch-latest-tag.outputs.latest-tag }}
  chart-version-latest:
    description: "The latest chart version set in Chart.yaml"
    value: ${{ steps.update-chart-version.outputs.chart-version-latest }}

runs:
  using: "composite"
  steps:
    - id: checkout
      name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ inputs.token }}
        fetch-depth: 0

    - id: fetch-latest-tag
      name: Fetch latest tag
      env:
        DOCKERHUB_NAMESPACE: ${{ inputs.dockerhub-namespace }}
        DOCKERHUB_REPOSITORY: ${{ inputs.dockerhub-repository }}
        DOCKER_IMAGE_TAG_PATTERN: ${{ inputs.docker-image-tag-pattern }}
      shell: bash
      run: |
        # Fetch latest tag

        echo "::group::🔧 Build Docker Hub API URL (${DOCKERHUB_NAMESPACE}/${DOCKERHUB_REPOSITORY})"
        DOCKERHUB_API_URL="https://hub.docker.com/v2/namespaces/${DOCKERHUB_NAMESPACE}/"\
        "repositories/${DOCKERHUB_REPOSITORY}/tags?page_size=100&"\
        "ordering=last_updated"
        echo "ℹ️ DOCKERHUB_API_URL: ${DOCKERHUB_API_URL}"
        echo "::endgroup::"

        echo "::group::📥 Fetch tags from Docker Hub (${DOCKERHUB_NAMESPACE}/${DOCKERHUB_REPOSITORY})"
        tags_response="$(curl -fsSL "${DOCKERHUB_API_URL}")"
        tags_count="$(jq -r '.count' <<< "${tags_response}")"
        echo "✅ Fetched ${tags_count} tags for ${DOCKERHUB_NAMESPACE}/${DOCKERHUB_REPOSITORY}"
        echo "::endgroup::"

        echo "::group::🔎 Find the latest tag matching the tag version pattern"
        latest_tag_info="$(
          jq -r --arg pattern "${DOCKER_IMAGE_TAG_PATTERN}" '
            .results
            | map(select(.name | test($pattern)))
            | sort_by(.name)
            | last // {}
            | {
                name: (.name // empty),
                last_updated: (.last_updated // empty)
              }
          ' <<< "${tags_response}"
        )"
        latest_tag="$(jq -r '.name // empty' <<< "${latest_tag_info}")"
        latest_tag_date="$(jq -r '.last_updated // empty' <<< "${latest_tag_info}")"

        if [[ -z "${latest_tag}" ]]; then
          echo "⚠️ No image tags matched pattern: ${DOCKER_IMAGE_TAG_PATTERN}"
        else
          echo "✅ Latest tag: ${latest_tag} (${latest_tag_date})"
          echo "latest-tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
        fi
        echo "::endgroup::"

    - id: update-chart-version
      name: Update Chart version
      env:
        CHART_FILE_PATH: ${{ inputs.chart-file-path }}
      shell: bash
      if: ${{ steps.fetch-latest-tag.outputs.latest-tag != '' }}
      run: |
        # Update Chart version

        if [[ ! -f "${CHART_FILE_PATH}" ]]; then
          echo "::error::❌ Chart file was not found: ${CHART_FILE_PATH}"
          exit 1
        fi

        echo "::group::📖 Read current Chart app version"
        chart_app_version="$(
          sed -n -E 's/^appVersion:[[:space:]]*"?([^"]*)"?[[:space:]]*$/\1/p' "${CHART_FILE_PATH}" | head -n 1
        )"
        if [[ -z "${chart_app_version}" ]]; then
          echo "::error::❌ Failed to read Chart app version from ${CHART_FILE_PATH}"
          echo "::endgroup::"
          exit 1
        fi
        echo "ℹ️ Current Chart app version: ${chart_app_version}"
        echo "::endgroup::"

        echo "::group::⚖️ Compare Chart app versions"
        latest_tag="${{ steps.fetch-latest-tag.outputs.latest-tag }}"
        chart_app_version_latest="${latest_tag}"
        if [[ "${chart_app_version}" == "${chart_app_version_latest}" ]]; then
          echo "✅ No update needed. Chart app version is already up to date"
          echo "::endgroup::"
          exit 0
        else
          echo "🔁 Version mismatch: chart app version = ${chart_app_version}," \
            "chart app latest version = ${chart_app_version_latest}"
        fi
        echo "::endgroup::"

        echo "::group::✍️ Update Chart version in ${CHART_FILE_PATH}"
        chart_version_latest="${chart_app_version_latest#v}"
        if [[ "${chart_version_latest}" =~ ^([0-9]+)$ ]]; then
          chart_version_latest="${chart_version_latest}.0.0"
          echo "⚠️ Version tag ${latest_tag} looks like a major version. Normalized to ${chart_version_latest}"
        fi
        if [[ "${chart_version_latest}" =~ ^([0-9]+\.[0-9]+)$ ]]; then
          chart_version_latest="${chart_version_latest}.0"
          echo "⚠️ Version tag ${latest_tag} looks like a major.minor version. Normalized to ${chart_version_latest}"
        fi

        semver_regex='(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)'\
        '(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?'\
        '(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?'
        if [[ -z "$(echo "${chart_version_latest}" | grep -oP "${semver_regex}")" ]]; then
            echo "::error::❌ Can't generate semantic version for '${latest_tag}' image tag"
            echo "::endgroup::"
            exit 1
        fi
        echo "✅ Chart latest version: ${chart_version_latest}" 
        echo "✅ Chart app latest version: ${chart_app_version_latest}"

        sed -i -E "s|^version:[[:space:]].*$|version: ${chart_version_latest}|" "${CHART_FILE_PATH}"
        sed -i -E "s|^appVersion:[[:space:]].*$|appVersion: \"${chart_app_version_latest}\"|" "${CHART_FILE_PATH}"
        
        echo "chart-version-latest=${chart_version_latest}" >> "${GITHUB_OUTPUT}"

        echo "✅ Updated Chart version in ${CHART_FILE_PATH} to ${chart_version_latest}"
        echo "::endgroup::"

    - id: commit-and-push
      name: Commit and push Chart changes
      env:
        CHART_FILE_PATH: ${{ inputs.chart-file-path }}
      if: ${{ steps.update-chart-version.outputs.chart-version-latest != '' }}
      shell: bash
      run: |
        # Commit and push Chart changes
        if git diff --quiet -- "${CHART_FILE_PATH}"; then
          echo "ℹ️ No changes to commit in ${CHART_FILE_PATH}"
          exit 0
        fi

        echo "::group::🧾 Commit Chart changes"
        chart_version_latest="${{ steps.update-chart-version.outputs.chart-version-latest }}"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "${CHART_FILE_PATH}"
        git commit -m "chore(chart): bump chart to ${chart_version_latest}"
        echo "✅ Committed changes for ${CHART_FILE_PATH}"
        echo "::endgroup::"

        echo "::group::🚀 Push changes"
        git push origin "HEAD:${GITHUB_REF_NAME}"
        echo "✅ Pushed commit to ${GITHUB_REF_NAME}"
        echo "::endgroup::"
